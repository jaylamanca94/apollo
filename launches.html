<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Launches | Apollo</title>
    <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml">
    <link rel="manifest" href="./site.webmanifest">
    <meta name="theme-color" content="#1F2427">
    <script>
      (() => {
        try {
          const storageKey = "apollo-theme";
          const storedTheme = window.localStorage.getItem(storageKey);
          const theme = ["light", "dark"].includes(storedTheme) ? storedTheme : "dark";
          document.documentElement.setAttribute("data-bs-theme", theme);
        } catch (error) {
          document.documentElement.setAttribute("data-bs-theme", "dark");
        }
      })();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link href="./styles.css?v=dashboard-direction-9" rel="stylesheet">
  </head>
  <body>
    <div class="apollo-app text-body">
      <nav class="navbar navbar-expand apollo-topbar">
        <div class="container-fluid apollo-navbar-inner px-3 px-sm-4">
          <a class="navbar-brand fw-semibold d-flex align-items-center gap-2" href="./index.html">
            <i class="fa-solid fa-rocket apollo-brand-icon" aria-hidden="true"></i>
            Apollo
          </a>
          <div class="apollo-navbar-actions d-flex align-items-center gap-2 ms-auto">
            <button class="btn btn-outline-secondary btn-sm apollo-theme-toggle" id="themeToggle" type="button" aria-label="Switch to light mode" aria-pressed="true" title="Switch to light mode">
              <i class="fa-solid fa-sun" aria-hidden="true"></i>
            </button>
            <a class="apollo-return-link" href="./index.html">
              <i class="fa-solid fa-arrow-left" aria-hidden="true"></i>
              Back to dashboard
            </a>
          </div>
        </div>
      </nav>

      <main class="apollo-shell launch-page-shell">
        <div id="launchPageStatus" class="visually-hidden" aria-live="polite" aria-atomic="true">Loading launch data.</div>
        <div class="d-flex flex-column apollo-page-stack">
          <header class="apollo-page-header">
            <div class="apollo-title-block">
              <p class="section-kicker mb-0">SpaceX Launches</p>
              <h1 class="apollo-page-title mb-0">Upcoming Launches</h1>
              <p class="apollo-page-subtitle mb-0">Launch windows, vehicles, pads, locations, and mission status from the launch feed.</p>
            </div>
            <div class="apollo-dashboard-actions">
              <p class="apollo-update-pill mb-0" id="launchesUpdated">Last updated: Loading</p>
              <button class="btn apollo-refresh-button" id="launchesRefreshButton" type="button" aria-describedby="launchPageStatus">
                Refresh data
              </button>
            </div>
          </header>

          <section class="card apollo-card launch-detail-panel">
            <div class="card-body section-card-body launch-detail-body" id="launchPageBody" aria-live="polite" aria-busy="true">
              <p class="state-message text-secondary mb-0">Loading launches...</p>
            </div>
          </section>
        </div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./launches.js?v=dashboard-direction-8"></script>
  </body>
</html>
